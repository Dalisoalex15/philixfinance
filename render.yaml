services:
  - type: web
    name: philix-finance-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate --schema=./prisma/schema.prod.prisma
    startCommand: npx prisma db push --schema=./prisma/schema.prod.prisma --accept-data-loss && npx tsx prisma/seed.ts && npx tsx src/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: philix-finance-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://philixfinance.vercel.app

databases:
  - name: philix-finance-db
    databaseName: philix_finance
    user: philix
    plan: free
