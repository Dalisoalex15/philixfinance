  <rect x="23" y="28" width="8" height="22" rx="2" fill="white" opacity="0.9"/>
  <rect x="35" y="18" width="8" height="32" rx="2" fill="white" opacity="1"/>

  <!-- Wordmark -->
  <text x="70" y="29"
        font-family="'Inter','Segoe UI',system-ui,sans-serif"
        font-weight="800"
        font-size="22"
        fill="white"
        letter-spacing="-0.3">PHILIX</text>
  <text x="70" y="50"
        font-family="'Inter','Segoe UI',system-ui,sans-serif"
