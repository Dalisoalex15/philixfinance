<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8940A"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Badge background -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#icon-grad)" filter="url(#shadow)"/>

  <!-- Bar chart mark -->
  <rect x="12" y="40" width="9" height="13" rx="2.5" fill="white" opacity="0.8"/>
  <rect x="25" y="30" width="9" height="23" rx="2.5" fill="white" opacity="0.9"/>
  <rect x="38" y="18" width="9" height="35" rx="2.5" fill="white" opacity="1"/>

  <!-- Subtle top highlight -->
  <rect x="2" y="2" width="60" height="28" rx="16" fill="white" opacity="0.07"/>
</svg>
